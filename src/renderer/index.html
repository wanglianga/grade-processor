<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校成绩单离线处理器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>📋 学校成绩单离线处理器</h1>
      <p class="subtitle">导入成绩表、学生名单和课程学分表，自动检测异常并导出报表</p>
    </header>

    <div class="main-layout">
      <aside class="sidebar">
        <section class="import-section">
          <h2>📥 数据导入</h2>

          <div class="import-group">
            <label>课程成绩表</label>
            <div class="file-input-area" id="gradeFileArea">
              <div class="file-drop-zone" data-type="grade">
                <span class="drop-icon">📄</span>
                <span>点击或拖拽导入Excel文件</span>
                <span class="drop-hint">支持 .xlsx .xls .csv</span>
              </div>
              <div class="file-list" id="gradeFileList"></div>
              <div class="sheet-selector" id="gradeSheetSelector" style="display:none">
                <label>选择工作表：</label>
                <select id="gradeSheetSelect"></select>
                <button id="gradeSheetConfirm" class="btn btn-sm">确认</button>
              </div>
            </div>
          </div>

          <div class="import-group">
            <label>学生名单</label>
            <div class="file-input-area" id="studentFileArea">
              <div class="file-drop-zone" data-type="student">
                <span class="drop-icon">👥</span>
                <span>点击或拖拽导入学生名单</span>
                <span class="drop-hint">包含学号、姓名、班级</span>
              </div>
              <div class="file-list" id="studentFileList"></div>
              <div class="sheet-selector" id="studentSheetSelector" style="display:none">
                <label>选择工作表：</label>
                <select id="studentSheetSelect"></select>
                <button id="studentSheetConfirm" class="btn btn-sm">确认</button>
              </div>
            </div>
          </div>

          <div class="import-group">
            <label>课程学分表</label>
            <div class="file-input-area" id="creditFileArea">
              <div class="file-drop-zone" data-type="credit">
                <span class="drop-icon">📚</span>
                <span>点击或拖拽导入课程学分表</span>
                <span class="drop-hint">包含课程名称、学分</span>
              </div>
              <div class="file-list" id="creditFileList"></div>
              <div class="sheet-selector" id="creditSheetSelector" style="display:none">
                <label>选择工作表：</label>
                <select id="creditSheetSelect"></select>
                <button id="creditSheetConfirm" class="btn btn-sm">确认</button>
              </div>
            </div>
          </div>
        </section>

        <section class="config-section">
          <h2>⚙️ 计算配置</h2>
          <div class="config-group">
            <label>平时成绩权重</label>
            <input type="number" id="regularWeight" value="0.3" min="0" max="1" step="0.05">
          </div>
          <div class="config-group">
            <label>实验成绩权重</label>
            <input type="number" id="experimentWeight" value="0" min="0" max="1" step="0.05">
          </div>
          <div class="config-group">
            <label>期末成绩权重</label>
            <input type="number" id="finalWeight" value="0.7" min="0" max="1" step="0.05">
          </div>
          <div class="weight-hint" id="weightHint">权重合计：1.0</div>
        </section>

        <section class="template-section">
          <h2>📐 课程规则模板</h2>
          <div class="template-actions">
            <button class="btn btn-sm" id="addTemplateBtn">+ 新增模板</button>
          </div>
          <div class="template-list" id="templateList"></div>
          <div class="template-editor" id="templateEditor" style="display:none">
            <div class="template-editor-title" id="templateEditorTitle">新增课程模板</div>
            <div class="config-group">
              <label>课程名称</label>
              <input type="text" id="templateCourseName" placeholder="输入课程名称">
            </div>
            <div class="config-group">
              <label>平时分权重</label>
              <input type="number" id="templateRegular" value="0.3" min="0" max="1" step="0.05">
            </div>
            <div class="config-group">
              <label>实验分权重</label>
              <input type="number" id="templateExperiment" value="0" min="0" max="1" step="0.05">
            </div>
            <div class="config-group">
              <label>期末分权重</label>
              <input type="number" id="templateFinal" value="0.7" min="0" max="1" step="0.05">
            </div>
            <div class="weight-hint" id="templateWeightHint">权重合计：1.0</div>
            <div class="template-editor-actions">
              <button class="btn btn-sm btn-primary" id="saveTemplateBtn">保存</button>
              <button class="btn btn-sm" id="cancelTemplateBtn">取消</button>
            </div>
          </div>
        </section>

        <button id="processBtn" class="btn btn-primary btn-lg" disabled>
          🔄 开始处理
        </button>
      </aside>

      <main class="content">
        <div class="tabs">
          <button class="tab active" data-tab="merged">📊 合并成绩</button>
          <button class="tab" data-tab="anomalies">⚠️ 异常检测 <span class="badge" id="anomalyBadge" style="display:none">0</span></button>
          <button class="tab" data-tab="makeup">📝 补考名单</button>
          <button class="tab" data-tab="deferred">⏸️ 缓考名单</button>
          <button class="tab" data-tab="classTeacher">👨‍🏫 班主任确认</button>
          <button class="tab" data-tab="summary">📈 班级汇总</button>
        </div>

        <div class="tab-content active" id="tab-merged">
          <div class="tab-toolbar">
            <input type="text" id="mergedSearch" placeholder="搜索学号、姓名、课程..." class="search-input">
            <button class="btn" id="exportMerged">📤 导出合并成绩</button>
          </div>
          <div class="table-container" id="mergedTable"></div>
        </div>

        <div class="tab-content" id="tab-anomalies">
          <div class="tab-toolbar">
            <select id="anomalyFilter" class="filter-select">
              <option value="all">全部异常</option>
              <option value="学号不存在">学号不存在</option>
              <option value="同课重复成绩">同课重复成绩</option>
              <option value="总评分计算不一致">总评分计算不一致</option>
              <option value="缺考但有分数">缺考但有分数</option>
              <option value="作弊不得补考">作弊不得补考</option>
            </select>
            <button class="btn" id="exportAnomalies">📤 导出异常清单</button>
          </div>
          <div class="table-container" id="anomalyTable"></div>
        </div>

        <div class="tab-content" id="tab-makeup">
          <div class="tab-toolbar">
            <button class="btn" id="exportMakeup">📤 导出补考名单</button>
          </div>
          <div class="table-container" id="makeupTable"></div>
        </div>

        <div class="tab-content" id="tab-deferred">
          <div class="tab-toolbar">
            <button class="btn" id="exportDeferred">📤 导出缓考名单</button>
          </div>
          <div class="table-container" id="deferredTable"></div>
        </div>

        <div class="tab-content" id="tab-classTeacher">
          <div class="tab-toolbar">
            <select id="classFilter" class="filter-select">
              <option value="all">全部班级</option>
            </select>
            <select id="problemTypeFilter" class="filter-select">
              <option value="all">全部类型</option>
              <option value="failed">挂科</option>
              <option value="absent">缺考</option>
              <option value="cheating">作弊</option>
              <option value="gpaAbnormal">绩点异常</option>
            </select>
            <button class="btn" id="confirmSelectedBtn">✅ 确认选中</button>
            <button class="btn" id="confirmAllBtn">✅ 确认全部</button>
            <button class="btn" id="exportConfirmedBtn">📤 导出通知名单</button>
          </div>
          <div class="table-container" id="classTeacherTable"></div>
        </div>

        <div class="tab-content" id="tab-summary">
          <div class="tab-toolbar">
            <button class="btn" id="exportSummary">📤 导出班级汇总</button>
          </div>
          <div class="table-container" id="summaryTable"></div>
        </div>
      </main>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display:none">
      <div class="loading-spinner"></div>
      <p>正在处理数据...</p>
    </div>

    <div id="toast" class="toast" style="display:none"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
